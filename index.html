<!DOCTYPE html> <!-- HTML5 문서임을 알려줌 -->
<html lang="kr">
<head>
    <meta charset="utf-8"> <!-- 한글이 정상적으로 보이도록 설정 -->
    <meta name="viewport" content="width=device-width, initial-scale=1"> 
    <title>DBD</title>

    <style>
        body {
    background-color: black;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
    overflow: hidden;
}
        
.fog-layer {
  position: absolute;
  bottom: 0; 
  left: 0;
  width: 100%;
  height: 80%; 
  z-index: 999;
  pointer-events: none;
  
  background: 
    url('FOG.png') repeat-x, 
    url('FOG.png') repeat-x;
  
  background-size: auto 100%, auto 110%;
  
  -webkit-mask-image: linear-gradient(to top, black 30%, transparent 100%);
  mask-image: linear-gradient(to top, black 30%, transparent 100%);

  opacity: 1;
  filter: blur(3px); 

  animation: moveFog 80s linear infinite;
}

@keyframes moveFog {
  from { 
    background-position: 0 0, 500px 0; 
  }
  to { 
    background-position: -2000px 0, -3500px 0; 
  }
}
.main-container {
    position: relative;
    width: 100%;
    max-width: 900px;
}

.bg-logo {
    width: 100%;
    opacity: 0.3;
}

.main-logo {
    width: 25%;
    min-width: 120px;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
}

.sub-text {
    width: 100%;
    position: absolute;
    bottom: -10%;
    left: 50%;
    transform: translateX(-50%);
}
.btn-container {
    position: absolute;
    bottom: 5%;
    display: flex;
    gap: 40px;
    width: 100%;
    justify-content: center;
}

.img-btn img {
    width: 180px;
    max-width: 40vw;
}
@media (max-width: 768px) {

    .main-logo {
        width: 40%;
    }

    .sub-text {
        width: 90%;
        bottom: -5%;
    }

    .btn-container {
        flex-direction: column;
        align-items: center;
        gap: 20px;
        bottom: 5%;
    }

    .img-btn img {
        width: 60%;
    }
}

.main-logo {
    width: 25%;
    min-width: 120px;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    transition: transform 0.3s ease; 
}

.main-logo:hover {
    transform: translate(-50%, -50%) scale(1.1);
}

.main-logo:active {
    transform: translate(-50%, -50%) scale(1.05);
}

@media (max-width: 768px) {

    .main-logo {
        width: 40%;
    }

    .bg-logo {
        width: 120%;
        opacity: 0.2;
    }

    .btn-container {
        flex-direction: column;
        align-items: center;
        gap: 20px;
        bottom: 10%;
    }

    .img-btn img {
        width: 60%;
    }

    .fog-layer {
        height: 100%;
        filter: blur(2px);
    }
}

.main-logo {
    width: 25%;
    min-width: 120px;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    transition: transform 0.3s ease;
}

.main-logo:hover {
    transform: translate(-50%, -50%) scale(1.1);
}

.main-logo:active {
    transform: translate(-50%, -50%) scale(1.05);
}

@media (max-width: 768px) {

    .main-logo {
        width: 40%;
    }

    .bg-logo {
        width: 120%;
        opacity: 0.2;
    }

    .btn-container {
        flex-direction: column;
        align-items: center;
        gap: 20px;
        bottom: 10%;
    }

    .img-btn img {
        width: 60%;
    }
}

    </style>
</head>
<body>
    
    <div class="fog-layer"></div>

  <div style="position: relative; display: flex; justify-content: center; align-items: center; width: 100%; min-height: 100vh;">
    <div class="main-container">
    <img src="NMGD.png" class="bg-logo">
    <a href="game.html">
    
    <img src="logo.png" class="main-logo">
</a>
    <img src="new.png" class="sub-text">
</div>
</div>
<div class="btn-container">

    <a href="ENTER.html" class="img-btn">
        <img src="enter.png" style="width: 250px;"
        style="rotate: calc(0.03);">
    </a>

    <a href="BEHIND.html" class="img-btn">
        <img src="behind.png" style="width: 250px;"
        style="rotate: calc(0.03);">
    </a>

</div>

<style>
    .img-btn img {
        filter: brightness(0.6);
        transition: 0.3s;
    }

    .img-btn:hover img {
        filter: brightness(1.2);
    }
</style>
</body>

</html>
