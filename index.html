<!DOCTYPE html> <!-- HTML5 문서임을 알려줌 -->
<html lang="kr">
<head>
    <meta charset="utf-8"> <!-- 한글이 정상적으로 보이도록 설정 -->
    <meta name="viewport" content="width=device-width, initial-scale=1"> 
    <title>DBD</title>

    <style>
        body {
            background-color: black;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        p {
            font-size: 250px;
            color: #181313;
            margin: 0;
            font-family: sans-serif;
        }
        
.fog-layer {
  position: absolute;
  bottom: 0; 
  left: 0;
  width: 100%;
  height: 80%; 
  z-index: 999;
  pointer-events: none;
  
  /* 경계선 제거 - 두 개 겹쳐놓기 */
  background: 
    url('FOG.png') repeat-x, 
    url('FOG.png') repeat-x;
  
  /* 첫 번째는 원래 크기, 높이를 조절 */
  background-size: auto 100%, auto 110%;
  
  /* 아래쪽은 진하고 위로 갈수록 투명해지게 */
  -webkit-mask-image: linear-gradient(to top, black 30%, transparent 100%);
  mask-image: linear-gradient(to top, black 30%, transparent 100%);

  opacity: 1;
  /* 살짝 경계선을 부드럽게 */
  filter: blur(3px); 

  animation: moveFog 80s linear infinite;
}

@keyframes moveFog {
  from { 
    /* 오른쪽에서 왼쪽으로 */
    background-position: 0 0, 500px 0; 
  }
  to { 
    /* 두 레이어의 속도를 다르게 */
    background-position: -2000px 0, -3500px 0; 
  }
}
    </style>
</head>
<body>
    
    <div class="fog-layer"></div>

  <div style="position: relative; display: flex; justify-content: center; align-items: center; width: 100%; height: 100vh;">
    <!-- NMGD 로고-->
    <img src="NMGD.png" style="width: 900px; position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%);">

    <!-- 데바데 로고 -->
    <img src="logo.png" style="width: 200px; position: relative; z-index: 2;">
    <!-- 뉴미디어 게임 디자인 글귀 -->
    <img src="new.png" style="width: 900px; position: absolute; top: 66%; left: 50%; transform: translateX(-50%);">
</div>
<div style="position: absolute; bottom: 10%; display: flex; gap: 200px; width: 100%; justify-content: center;">

    <!-- 왼쪽 버튼 -->
    <a href="ENTER.html" class="img-btn">
        <img src="enter.png" style="width: 250px;"
        style="rotate: calc(0.03);">
    </a>

    <!-- 오른쪽 버튼 -->
    <a href="BEHIND.html" class="img-btn">
        <img src="behind.png" style="width: 250px;"
        style="rotate: calc(0.03);">
    </a>

</div>

<style>
  /* 밝아지는 효과 */
    .img-btn img {
        filter: brightness(0.6);
        transition: 0.3s;
    }

    .img-btn:hover img {
        filter: brightness(1.2);
    }
</style>
</body>

</html>
