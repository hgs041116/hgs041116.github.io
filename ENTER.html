<!DOCTYPE html> <!-- HTML5 문서임을 알려줌 -->
<html lang="kr">
<head>
    <meta charset="utf-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Killers</title>
    <style>
        
        body {
    background-color: black;
    padding-top: 20px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
}

        .fog-layer {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: -1; 
  pointer-events: none;
  
  
  background: 
    url('FOG.png') repeat-x,
    url('FOG.png') repeat-x;
  
  
  background-size: 200% 100%, auto 120%;
  opacity: 1; /* 투명도 */
  filter: blur(5px); /* 경계선 */
  
  animation: moveFogRightToLeft 80s linear infinite;
}

@keyframes moveFogRightToLeft {
  from { 
    /* 오른쪽에서 시작 */
    background-position: 0 0, 800px 0; 
  }
  to { 
    /* 왼쪽으로 무한 이동 */
    background-position: -2000px 0, -3200px 0; 
  }
}

        /* 버튼 */
        .back-container {
            position: absolute;
            left: 15px;
            bottom: -5px;
        }

        /* 밝아지는 효과 */
        .img-btn img {
            filter: brightness(0.6);
            transition: 0.3s;
            width: 100px;
        }

        .img-btn:hover img {
            filter: brightness(1.2);
        }
        .character-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 20px;
    margin-top: 100px;
    width: 90%;
    max-width: 1200px;
}

.card {
    text-align: center;
    position: relative;
    z-index: 2;
}

.card img {
    width: 100%;
    max-width: 220px;
    height: auto;
}

.card:hover img {
    filter: brightness(1.2);
}

.card p {
    margin-top: 5px;
    color: #967878;
    font-size: clamp(12px, 2vw, 16px);
    letter-spacing: 2px;
}
        
.main-title {
    width: 60%;
    max-width: 500px;
    margin-top: 20px;
}

.back-container {
    position: fixed;
    left: 10px;
    bottom: 10px;
}

.img-btn img {
    width: 80px;
    max-width: 20vw;
}

@media (max-width: 768px) {

    .character-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 15px;
        margin-top: 60px;
    }

    .main-title {
        width: 80%;
    }

    .card img {
        max-width: 150px;
    }
} 
.card img {
    aspect-ratio: 3 / 4;
    object-fit: cover;
}
    </style>
</head>

    <body>

        <div class="fog-layer"></div>

    <!-- 'KILLERS' 로고 -->
    <div class="header">
        <img src="KILLERS.png" alt="KILLERS" class="main-title">
    </div>

   <div class="character-grid">
    <!-- 1번 -->
    <div class="card">
        <img src="CLOWN.png" alt="Character 1">
        <p>CLOWN</p>
    </div>

    <!-- 2번 -->
    <div class="card">
        <img src="HUNTRESS.png" alt="Character 2">
        <p>HUNTRESS</p>
    </div>

    <!-- 3번 -->
    <div class="card">
        <img src="DEMOGORGON.png" alt="Character 3">
        <p>DEMOGORGON</p>
    </div>

    <!-- 4번 -->
    <div class="card">
        <img src="ANIMATRONIC.png" alt="Character 4">
        <p>ANIMATRONIC</p>
    </div>

    <!-- 5번 -->
    <div class="card">
        <img src="ONI.png" alt="Character 5">
        <p>ONI</p>
    </div>

    <!-- 6번 -->
    <div class="card">
        <img src="PYRAMID HEAD.png" alt="Character 6">
        <p>PYRAMID HEAD</p>
    </div>

    <!-- 7번 -->
    <div class="card">
        <img src="UNKNOWN.png" alt="Character 7">
        <p>UNKNOWN</p>
    </div>

    <!-- 8번 -->
    <div class="card">
        <img src="HILLBILLY.png" alt="Character 8">
        <p>HILLBILLY</p>
    </div>

<div class="character-grid">
    ...
</div>

<div class="back-container">
    <a href="index.html" class="img-btn">
        <img src="BACK 1.png" alt="BACK"> 
    </a>
</div>

</body>
</html>
